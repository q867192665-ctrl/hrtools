<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模板测试页面</title>
</head>
<body>
    <h1>模板渲染测试</h1>
    
    <h2>Upload标签页内容：</h2>
    <div id="upload" style="border: 1px solid #ccc; padding: 20px; margin: 10px;">
        <h2>上传工资表</h2>
        <p style="color: #666; margin-bottom: 20px;">支持Excel (.xlsx, .xls) 和 CSV (.csv) 格式，文件大小不超过10MB</p>
        
        <div id="uploadAlert"></div>
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold; display: block; margin-bottom: 5px;">工资表所属月份 <span style="color: red;">*</span></label>
            <input type="month" id="salaryMonth" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 200px;" required>
            <p style="color: #999; font-size: 12px; margin-top: 4px;">请选择工资表对应的年月，同月份多次导入以最新为准</p>
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>拖拽文件到此处，或点击选择文件</p>
            <input type="file" class="file-input" id="fileInput" accept=".xlsx,.xls,.csv">
            <button class="btn btn-primary" style="margin-top: 10px;" onclick="document.getElementById('fileInput').click()">选择文件</button>
        </div>
    </div>
    
    <h2>Export标签页内容：</h2>
    <div id="export" style="border: 1px solid #ccc; padding: 20px; margin: 10px;">
        <h2>数据导出</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px;">
            <div style="border: 1px solid #ddd; padding: 20px; border-radius: 10px;">
                <h3>导出汇总数据</h3>
                <p style="color: #666; margin: 10px 0;">导出工资汇总数据为Excel格式（含签名图片）</p>
                <div style="margin-bottom: 10px;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px;">选择月份</label>
                    <select id="exportMonth" style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; width: 100%;">
                        <option value="">全部月份</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="exportExcel()">导出Excel</button>
            </div>
        </div>
    </div>
</body>
</html>
