<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人事管理系统</title>
    <style>
        :root {
            --bg-primary: #F5F7FA;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #EEF2F7;
            --accent-primary: #1E88E5;
            --accent-hover: #1976D2;
            --accent-light: #E3F2FD;
            --text-primary: #212121;
            --text-secondary: #616161;
            --text-tertiary: #9E9E9E;
            --text-muted: #BDBDBD;
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #F44336;
            --info: #2196F3;
            --border-primary: #E0E0E0;
            --border-secondary: #EEEEEE;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 20px;
            --space-6: 24px;
            --space-8: 32px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            padding: 0 var(--space-6);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-title .logo {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .user-info .welcome {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .admin-badge {
            display: inline-flex;
            align-items: center;
            background: var(--accent-light);
            color: var(--accent-primary);
            padding: var(--space-1) var(--space-3);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .btn-logout {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-primary);
            padding: var(--space-2) var(--space-4);
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s ease;
        }
        
        .btn-logout:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-primary);
        }
        
        .main-content {
            flex: 1;
            padding: var(--space-8);
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        
        .page-header {
            margin-bottom: var(--space-6);
        }
        
        .page-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        
        .page-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .section-title {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            margin: var(--space-6) 0 var(--space-4) 0;
            padding-bottom: var(--space-2);
            border-bottom: 2px solid var(--accent-primary);
            display: inline-block;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-4);
        }
        
        .menu-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            padding: var(--space-6);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .menu-card:hover {
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(30, 136, 229, 0.15);
            transform: translateY(-2px);
        }
        
        .menu-card .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: var(--space-4);
        }
        
        .menu-card.salary .card-icon {
            background: #E8F5E9;
        }
        
        .menu-card.leave .card-icon {
            background: #FFF3E0;
        }
        
        .menu-card.user-manage .card-icon {
            background: var(--accent-light);
        }
        
        .menu-card.device-manage .card-icon {
            background: #F3E5F5;
        }
        
        .menu-card h3 {
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: var(--space-2);
        }
        
        .menu-card p {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
        }
        
        .menu-card .badge {
            display: inline-flex;
            align-items: center;
            background: #FFF3E0;
            color: var(--warning);
            padding: var(--space-1) var(--space-3);
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-top: var(--space-3);
        }
        
        .admin-section {
            display: none;
            margin-top: var(--space-6);
        }
        
        .footer {
            text-align: center;
            padding: var(--space-6);
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border-secondary);
            background: var(--bg-secondary);
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 0 var(--space-4);
            }
            
            .main-content {
                padding: var(--space-4);
            }
            
            .page-header h1 {
                font-size: 22px;
            }
            
            .menu-grid {
                grid-template-columns: 1fr;
            }
            
            .user-info .welcome {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">
            <div class="logo">🏢</div>
            人事管理系统
        </div>
        <div class="user-info">
            <span class="welcome" id="welcomeText">欢迎，用户</span>
            <span id="roleBadge"></span>
            <button class="btn-logout" onclick="logout()">退出登录</button>
        </div>
    </div>
    
    <div class="main-content">
        <div class="page-header">
            <h1>功能菜单</h1>
            <p>请选择要使用的功能模块</p>
        </div>
        
        <div class="section-title">常用功能</div>
        <div class="menu-grid">
            <div class="menu-card salary" onclick="goToSalary()">
                <div class="card-icon">💰</div>
                <h3>工资条管理</h3>
                <p>查看工资明细、签收确认、导出报表</p>
            </div>
            
            <div class="menu-card leave" onclick="goToLeave()">
                <div class="card-icon">📅</div>
                <h3>请假管理</h3>
                <p>请假申请、审批流程、假期统计</p>
            </div>
            
            <div class="menu-card customer" onclick="goToCustomerArchive()" id="customerCard" style="display:none;">
                <div class="card-icon" style="background:#E0F7FA;">📋</div>
                <h3>客户档案</h3>
                <p>客户信息管理、基础表导入、档案导出</p>
            </div>
        </div>
        
        <div class="admin-section">
            <div class="section-title">管理员功能</div>
            <div class="menu-grid">
                <div class="menu-card user-manage" onclick="goToUserManage()">
                    <div class="card-icon">👥</div>
                    <h3>人员管理</h3>
                    <p>添加用户、修改信息、重置密码</p>
                </div>
                
                <div class="menu-card device-manage" onclick="goToDeviceManage()">
                    <div class="card-icon">📱</div>
                    <h3>设备管理</h3>
                    <p>设备绑定、解绑、异常登录记录</p>
                </div>
                
                <div class="menu-card cleanup" onclick="goToCleanup()">
                    <div class="card-icon">🗑️</div>
                    <h3>数据清理</h3>
                    <p>清空工资表、签收记录、缓存文件</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="footer">
        © 2026 人事管理系统
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const role = localStorage.getItem('role');
        
        if (!token) {
            window.location.href = '/login';
        }
        
        if (username) {
            document.getElementById('welcomeText').textContent = '欢迎，' + username;
        }
        
        if (role === 'admin') {
            document.getElementById('roleBadge').innerHTML = '<span class="admin-badge">管理员</span>';
            document.querySelector('.admin-section').style.display = 'block';
            document.getElementById('customerCard').style.display = 'block';
        }
        
        function goToSalary() {
            window.location.href = '/admin';
        }
        
        function goToLeave() {
            window.location.href = '/leave-manage';
        }
        
        function goToUserManage() {
            window.location.href = '/user-manage';
        }
        
        function goToDeviceManage() {
            window.location.href = '/device-manage';
        }
        
        function goToCustomerArchive() {
            window.location.href = '/customer-archive';
        }
        
        function goToCleanup() {
            window.location.href = '/cleanup';
        }
        
        async function logout() {
            try {
                await fetch('/api/logout', {
                    method: 'POST',
                    headers: {
                        'Authorization': token
                    }
                });
            } catch (e) {
                console.error('Logout error:', e);
            }
            
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
